name: CI

on:
  push:
    branches: [main, master, "claude/**", "feature/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Verify package is importable
        run: |
          python -c "import transjax; print('transjax', transjax.__version__)"
          python -c "from transjax.analyzer import FortranAnalyzer; print('FortranAnalyzer ok')"
          python -c "from transjax.agents.utils.config_loader import get_llm_config; print(get_llm_config())"

      - name: Lint with ruff
        run: ruff check src/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Tests must not require a real API key
          ANTHROPIC_API_KEY: "test-key-not-used"

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          python -c "import transjax; print('wheel install ok:', transjax.__version__)"
