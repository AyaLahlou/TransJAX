name: Publish to PyPI

# Triggers when you push a version tag, e.g. git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── 1. Run the full test suite before publishing ──────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install with dev extras
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: "test-key-not-used"

  # ── 2. Build the distribution artifacts ───────────────────────────────────
  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build + twine
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to TestPyPI (smoke test) ───────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/transjax

    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── 4. Publish to PyPI (production) ───────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    environment:
      name: pypi
      url: https://pypi.org/p/transjax

    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 5. Create a GitHub Release ────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
